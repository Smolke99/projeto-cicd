name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: codigos_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Esperar MySQL subir
        run: sleep 20

      - name: Criar banco e tabela
        run: |
          mysql -h 127.0.0.1 -u root -proot codigos_db < schema.sql

      - name: Rodar testes
        run: pytest -v

      - name: Verificar banco e tabela
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "SHOW DATABASES;"
          mysql -h 127.0.0.1 -u root -proot -e "USE codigos_db; SHOW TABLES;"